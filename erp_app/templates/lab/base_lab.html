{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: linear-gradient(180deg, #1e1e2f, #111);
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #0d6efd;
            color: white;
        }

        .logout-btn {
            position: absolute;
            bottom: 20px;
            width: 90%;
            left: 5%;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🧪 Lab Panel</h4>

    <a href="{% url 'lab_dashboard' %}">🏠 Dashboard</a>

    <!-- ✅ FIXED REPORTS LINK -->
    <a href="{% url 'lab_reports' %}">📄 Reports</a>

    <!-- LOGOUT -->
    <div class="logout-btn">
        <a href="{% url 'logout' %}" class="btn btn-danger w-100">
            🔓 Logout
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
        Welcome, {{ request.user.username }}
    </div>

    <!-- PAGE CONTENT -->
    {% block content %}
    {% endblock %}

</div>

</body>
</html>
