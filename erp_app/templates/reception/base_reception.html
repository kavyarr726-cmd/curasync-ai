<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reception Panel</title><!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #f5f7fa;
    }

    /* 🔷 Sidebar */
    .sidebar {
        width: 230px;
        height: 100vh;
        position: fixed;
        background-color: #1e293b;
        color: white;
        padding-top: 20px;
    }

    .sidebar h4 {
        text-align: center;
        margin-bottom: 30px;
    }

    .sidebar a {
        display: block;
        padding: 12px 20px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }


    .sidebar a:hover {
            background: #334155;
        }

    /* 🔷 Main Content */
    .main-content {
        margin-left: 230px;
        padding: 20px;
    }

    /* 🔷 Topbar */
    .topbar {
        background: white;
        padding: 10px 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .logout-btn {
        float: right;

    }
    .logout {
            background-color: #e74c3c;
            text-align: center;
            margin-top: 30px;
        }


        .logout:hover {
            background-color: #c0392b;
        }
</style>

</head><body><!-- 🔷 Sidebar -->
<div class="sidebar">
    <h4>🏥 Reception</h4>

    <a href="{% url 'reception_dashboard' %}">📊 Dashboard</a>
    <a href="{% url 'view_patients'%}">👥Patients</a>
    <a href="{% url 'add_patient' %}">➕ Add Patient</a>
    <a href="{% url 'reception_book_appointment' %}">📅 Book Appointment</a>
    <a href="{% url 'view_appointments' %}">📋 Appointments</a>
    <a href="{% url 'logout' %}" class="logout">Logout</a>
</div>

<div class="main-content">
    <div class="topbar">Welcome,{{request.user.username}}
        </div>

    <!-- 🔷 Page Content -->
    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
