<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Forgot Password — CuraSync AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}.card{max-width:400px;width:100%;border-radius:20px;padding:36px;}.form-control{border-radius:8px;padding:10px 14px;border:1px solid #e2e8f0;}.btn-submit{width:100%;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;}</style>
</head><body>
<div class="card bg-white shadow-lg">
  <div class="text-center mb-4"><div style="font-size:40px;">🔑</div><h3 style="font-weight:800;">Forgot Password</h3><p class="text-muted" style="font-size:13px;">Enter your registered phone number</p></div>
  {% if message %}<div style="background:#fee2e2;border-radius:8px;padding:10px 14px;margin-bottom:16px;color:#991b1b;font-size:13px;">{{ message }}</div>{% endif %}
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold" style="font-size:12px;">Phone Number</label><input name="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required></div>
    <button class="btn-submit">Send OTP</button>
    <div class="text-center mt-3"><a href="{% url 'role_login' 'PATIENT' %}" style="color:#0ea5e9;font-size:13px;text-decoration:none;">← Back to Login</a></div>
  </form>
</div></body></html>
