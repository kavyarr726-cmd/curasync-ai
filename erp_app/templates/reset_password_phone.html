<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Reset Password — CuraSync AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}.card{max-width:400px;width:100%;border-radius:20px;padding:36px;}.form-control{border-radius:8px;padding:10px 14px;border:1px solid #e2e8f0;}.btn-submit{width:100%;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;}</style>
</head><body>
<div class="card bg-white shadow-lg">
  <div class="text-center mb-4"><div style="font-size:40px;">🔒</div><h3 style="font-weight:800;">New Password</h3></div>
  {% if message %}<div style="background:#fee2e2;border-radius:8px;padding:10px;margin-bottom:16px;color:#991b1b;font-size:13px;">{{ message }}</div>{% endif %}
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold" style="font-size:12px;">New Password</label><input name="password" type="password" class="form-control" required placeholder="Min 6 characters"></div>
    <div class="mb-3"><label class="form-label fw-semibold" style="font-size:12px;">Confirm Password</label><input name="confirm_password" type="password" class="form-control" required></div>
    <button class="btn-submit">Reset Password</button>
  </form>
</div></body></html>
